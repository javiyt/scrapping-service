# =============================================================================
# Scraper API — Example configuration
# =============================================================================
# Copy this file to configs/config.yaml and adjust as needed.
#
# All values can be overridden at runtime via environment variables:
#   SCRAPER_SERVER_PORT, SCRAPER_CACHE_SQLITE_PATH, etc.
# =============================================================================

# ------------------------------------------------------------------- Server
server:
  host: 0.0.0.0
  port: 8080
  api_key_required: true
  cors_origins:
    - "*"

# --------------------------------------------------------------------- Auth
# Multi-key profile authentication.
#
# Each entry in ``api_keys`` maps an API key to a named profile that can
# override safe parts of the global configuration.
#
# Environment variable expansion is supported for the ``key`` field:
#   key: ${SCRAPER_API_KEY_FANATICS}
#
# If the referenced env var is not set, the profile is silently disabled
# (a warning is logged — the secret placeholder is never exposed).
#
# Profiles can only override these sections:
#   cache, scraper, security, domains, debug, browser, jobs
#
# These sections are FORBIDDEN and will cause a startup error:
#   server, auth, config_path, log_level
auth:
  default_profile: default
  expose_profile_in_response: false
  api_keys:
    - name: default
      key: ${SCRAPER_API_KEY}
      description: Default internal client
      enabled: true
    # - name: exampleprofile
    #   key: ${SCRAPER_API_KEY_EXAMPLEPROFILE}
    #   description: Example profile
    #   enabled: true
    #   overrides:
    #     scraper:
    #       default_mode: browser
    #       timeout_seconds: 60
    #       max_concurrency: 1
    #     cache:
    #       default_ttl_seconds: 21600
    #       stale_if_error: true
    #     security:
    #       allowed_domains:
    #         - example.com
    #         - www.example.com
    #     domains:
    #       example.com:
    #         allowed: true
    #         min_delay_seconds: 6
    #         max_concurrent_requests: 1
    #         default_ttl_seconds: 21600
    #       www.example.com:
    #         allowed: true
    #         min_delay_seconds: 6
    #         max_concurrent_requests: 1
    #         default_ttl_seconds: 21600
    # - name: debug
    #   key: ${SCRAPER_API_KEY_DEBUG}
    #   description: Temporary debug profile
    #   enabled: false
    #   overrides:
    #     debug:
    #       screenshots: true
    #       html_dumps: true
    #     cache:
    #       default_ttl_seconds: 300

# -------------------------------------------------------------------- Cache
cache:
  backend: sqlite
  sqlite_path: data/scraper-cache.db
  default_ttl_seconds: 21600          # 6 hours
  max_html_size_mb: 10                # Truncate responses larger than this
  stale_if_error: true                # Serve expired cache on fetch failure

  # Cache maintenance — automatic cleanup to prevent unbounded growth.
  cleanup_enabled: true               # Enable automatic background cleanup
  cleanup_interval_seconds: 3600      # Run cleanup every hour
  delete_expired_after_seconds: 86400 # Delete entries expired >24h ago
  max_entries: 10000                  # Max cache rows before eviction
  max_size_mb: 512                    # Approximate max DB size
  vacuum_after_cleanup: false         # Skip VACUUM by default (can block writes)

# ----------------------------------------------------------------- Scraper
scraper:
  default_mode: auto                  # http | browser | auto
  headless: true
  timeout_seconds: 45
  max_concurrency: 1
  user_agent_profile: desktop_es

# ---------------------------------------------------------------- Browser
browser:
  arguments:
    - "--headless=new"
    - "--no-sandbox"
    - "--disable-dev-shm-usage"
    - "--disable-gpu"
    - "--disable-background-networking"
    - "--window-size=1366,768"

# ------------------------------------------------------------------ Proxy
# Global proxy configuration.  All requests will be routed through this
# proxy when ``enabled`` is true, unless overridden per-request (requires
# ``allow_request_override: true``).
proxy:
  enabled: false
  url: null                               # e.g. http://user:pass@proxy.example:8080
  country: null                            # e.g. ES (provider hint)
  allow_request_override: false            # When false, per-request proxy config is rejected
  block_private_proxy_hosts: true          # Reject proxies on private/localhost IPs

# --------------------------------------------------------------- Security
security:
  block_private_ips: true
  block_localhost: true
  allowed_domains: []                 # Empty = allow all non-private domains

# ---------------------------------------------------------------- Domains
# Per-domain overrides.  Any key here can appear in "allowed_domains".
domains:
  example.com:
    allowed: true
    min_delay_seconds: 5
    max_concurrent_requests: 1
    default_ttl_seconds: 21600

# ------------------------------------------------------------------ Debug
debug:
  screenshots: false
  html_dumps: false
  dir: debug

# ---------------------------------------------------------------- Logging
log_level: INFO
