openapi: 3.0.3

info:
  title: Scraper API
  description: |
    Containerized scraping microservice — fetch rendered HTML from URLs.

    This API provides endpoints for:
      - Single URL scraping with multiple modes (HTTP, Browser, Auto)
      - Batch scraping of multiple URLs with controlled concurrency
      - Async job queuing and management
      - Cache operations (stats, purge, cleanup, vacuum)
      - Health and readiness checks

    Authentication: API key via Bearer token in Authorization header (required for most endpoints).

  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.yourdomain.com/v1
    description: Production server
  - url: https://staging.yourdomain.com/v1
    description: Staging environment

tags:
   - name: Health
     description: Health and readiness checks
   - name: Scrape
     description: URL scraping endpoints
   - name: Cache
     description: Cache management operations
   - name: Jobs
     description: Async job queue management

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "API-Key"
# =========================================================== SCHEMA DEFINITIONS
  schemas:
    # Health endpoints
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded, unavailable]
          default: ok
        version:
          type: string
          default: "1.0.0"
        service:
          type: string
          default: "scraper-api"

    ReadinessResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded, unavailable]
          default: ok
        checks:
          type: object
          additionalProperties:
            type: string

    # Scrape endpoints
    ExtractField:
      type: object
      properties:
        selector:
          type: string
          description: CSS selector to locate element(s)
        type:
          type: string
          enum: [text, html, attr, object]
          default: text
          description: Type of value to extract
        attribute:
          type: string
          description: Attribute name for 'attr' type
        multiple:
          type: boolean
          default: false
          description: Return list when true
        default:
          type: object
          description: Fallback value when no match
        required:
          type: boolean
          default: false
          description: Structured error on failure
        absolute_url:
          type: boolean
          default: false
          description: Convert to absolute URL

    ExtractConfig:
      type: object
      properties:
        enabled:
          type: boolean
          default: false
          description: Master toggle for extraction
        base_url:
          type: string
          description: Override base URL for relative-to-absolute conversion
        fields:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ExtractField'

    NormalizeConfig:
      type: object
      properties:
        enabled:
          type: boolean
          default: false
          description: Master toggle for HTML normalization
        absolute_urls:
          type: boolean
          default: false
          description: Convert relative URLs to absolute
        remove_scripts:
          type: boolean
          default: false
          description: Remove <script> elements
        remove_styles:
          type: boolean
          default: false
          description: Remove <style> elements and inline styles
        remove_comments:
          type: boolean
          default: false
          description: Remove HTML comments
        remove_meta:
          type: boolean
          default: false
          description: Remove <meta> elements
        remove_noscript:
          type: boolean
          default: false
          description: Remove <noscript> elements
        collapse_whitespace:
          type: boolean
          default: false
          description: Reduce whitespace runs to single spaces
        minify:
          type: boolean
          default: false
          description: Compact HTML without breaking semantics

    ProxyConfig:
      type: object
      properties:
        enabled:
          type: boolean
          default: false
          description: Master toggle for proxy configuration
        url:
          type: string
          description: Proxy URL (http, https, socks5 schemes)
        country:
          type: string
          description: Country hint for proxy provider

    ScrollConfig:
      type: object
      properties:
        enabled:
          type: boolean
          default: false
        max_scrolls:
          type: integer
          minimum: 1
          maximum: 100
          default: 5
        delay_ms:
          type: integer
          minimum: 100
          maximum: 30000
          default: 1000
        stop_when_no_growth:
          type: boolean
          default: true

    DebugConfig:
      type: object
      properties:
        screenshot:
          type: boolean
          default: false
        html_dump:
          type: boolean
          default: false

    ScrapeRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          minLength: 1
          maxLength: 8192
          description: Target URL to scrape
        mode:
          type: string
          enum: [http, browser, auto]
          default: auto
          description: Scraping mode (http, browser, or auto)
        cache_ttl_seconds:
          type: integer
          minimum: 60
          maximum: 2592000
          description: Per-request cache TTL (60s - 30 days)
        force_refresh:
          type: boolean
          default: false
          description: Bypass cache and fetch fresh content
        wait_until:
          type: string
          enum: [load, domcontentloaded, networkidle, networkidle0]
          default: networkidle
          description: Browser wait strategy (browser mode only)
        wait_selector:
          type: string
          maxLength: 500
          description: CSS selector to wait for before returning (browser mode)
        timeout_seconds:
          type: integer
          minimum: 5
          maximum: 120
          default: 45
          description: Maximum time to wait for page load
        proxy:
          $ref: '#/components/schemas/ProxyConfig'
        scroll:
          $ref: '#/components/schemas/ScrollConfig'
        debug:
          $ref: '#/components/schemas/DebugConfig'
        normalize:
          $ref: '#/components/schemas/NormalizeConfig'
        extract:
          $ref: '#/components/schemas/ExtractConfig'

    ScrapeResponse:
      type: object
      properties:
        url:
          type: string
        final_url:
          type: string
        status_code:
          type: integer
        from_cache:
          type: boolean
          default: false
        stale:
          type: boolean
          default: false
        fetched_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        html:
          type: string
          description: Rendered HTML content
        metadata:
          $ref: '#/components/schemas/Metadata'
        extracted:
          type: object
          description: Structured data from CSS selectors
        extraction_error:
          type: object
          description: Error when required extraction field failed

    Metadata:
      type: object
      properties:
        mode:
          type: string
        elapsed_ms:
          type: integer
        content_length:
          type: integer
        cache_key:
          type: string
        normalized:
          type: boolean
          default: false
          description: True when normalization was applied
        normalization:
          type: object
          description: Which features were applied

    BatchItem:
      type: object
      required: [url, mode]
      properties:
        url:
          type: string
          minLength: 1
          maxLength: 8192
        mode:
          type: string
          enum: [http, browser, auto]
          default: auto
        cache_ttl_seconds:
          type: integer
          minimum: 60
          maximum: 2592000
        force_refresh:
          type: boolean
          default: false
        wait_until:
          type: string
          enum: [load, domcontentloaded, networkidle, networkidle0]
          default: networkidle
        wait_selector:
          type: string
          maxLength: 500
        timeout_seconds:
          type: integer
          minimum: 5
          maximum: 120
          default: 45
        proxy:
          $ref: '#/components/schemas/ProxyConfig'
        scroll:
          $ref: '#/components/schemas/ScrollConfig'
        debug:
          $ref: '#/components/schemas/DebugConfig'
        normalize:
          $ref: '#/components/schemas/NormalizeConfig'
        extract:
          $ref: '#/components/schemas/ExtractConfig'

    BatchScrapeRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BatchItem'
          minimum: 1
          maximum: 50
        max_concurrency:
          type: integer
          minimum: 1
          maximum: 10
          default: 3

    BatchResult:
      type: object
      properties:
        url:
          type: string
        success:
          type: boolean
        result:
          $ref: '#/components/schemas/ScrapeResponse'
        error:
          type: object

    BatchScrapeResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/BatchResult'
        total:
          type: integer
        succeeded:
          type: integer
        failed:
          type: integer
        elapsed_ms:
          type: integer

    CacheStats:
      type: object
      properties:
        total_entries:
          type: integer
        total_size_bytes:
          type: integer
        expired_entries:
          type: integer
        cache_path:
          type: string

    PurgeResponse:
      type: object
      properties:
        purged_entries:
          type: integer
        message:
          type: string

    CacheCleanupRequest:
      type: object
      properties:
        delete_expired_after_seconds:
          type: integer
        max_entries:
          type: integer
        max_size_mb:
          type: integer
        vacuum:
          type: boolean

    CacheVacuumResult:
      type: object
      properties:
        size_after_bytes:
          type: integer

    CacheCleanupResult:
      type: object
      properties:
        total_deleted:
          type: integer
        size_after_bytes:
          type: integer
        entries_after:
          type: integer

    # Job endpoints
    JobStatus:
      type: string
      enum: [queued, running, succeeded, failed, cancelled]

    JobResponse:
      type: object
      properties:
        job_id:
          type: string
        status:
          $ref: '#/components/schemas/JobStatus'
        url:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        result:
          type: object
        error:
          type: object
        profile_name:
          type: string
          description: Authenticated profile name (optional)

    JobListResponse:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/JobResponse'
        total:
          type: integer

    # Error models
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            type:
              type: string
            message:
              type: string
            details:
              type: object

paths:
   /health:
     get:
       operationId: healthCheck
       summary: Liveness check
       description: Always returns 200 when the service is running. No authentication required.
       tags: [Health]
       security: []
       responses:
         '200':
           description: Service is healthy
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/HealthResponse'

   /ready:
     get:
       operationId: readinessCheck
       summary: Readiness probe
       description: Verifies config, cache, and scraper are all initialized. Requires authentication for metrics collection.
       tags: [Health]
       security:
         - bearerAuth: []
       responses:
         '200':
           description: All services ready
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ReadinessResponse'
         '503':
           description: Service degraded

   /metrics:
     get:
       operationId: getMetrics
       summary: Prometheus-style metrics
       description: Returns Prometheus-formatted text metrics for monitoring. No authentication required.
       tags: [Monitoring]
       security: []
       responses:
         '200':
           description: Text metrics response
           content:
             text/plain:
               schema:
                 type: string

   # ====================================================== Scrape Endpoints
   /v1/scrape:
     post:
       operationId: scrapeUrl
       summary: Scrape single URL
       description: |
         Scrape a single URL and return its rendered HTML. Supports multiple modes:

           - **http**: Uses standard HTTP headers (headless browser)
           - **browser**: Uses headless Chrome/Chromium with full JavaScript execution
           - **auto**: Auto-detects based on user-agent and content

         Request body fields:
           - url: Target URL to scrape
           - mode: Scraping mode (http, browser, or auto)
           - cache_ttl_seconds: TTL for caching (60s - 30 days)
           - force_refresh: Bypass cache if true
           - wait_until: Browser wait strategy
           - wait_selector: CSS selector to wait for
           - timeout_seconds: Max time to wait (5-120s)
           - proxy: Proxy configuration for this request
           - scroll: Scroll settings for JS-rendered pages
           - debug: Debug output controls
           - normalize: HTML normalization options
           - extract: CSS selector extraction config

         Authentication: Required unless API key is disabled in config.

       tags: [Scrape]
       security:
         - bearerAuth: []
       requestBody:
         required: true
         content:
           application/json:
             schema:
               $ref: '#/components/schemas/ScrapeRequest'
       responses:
         '200':
           description: Successful scrape
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ScrapeResponse'
         '400':
           description: Bad Request
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
         '422':
           description: Validation error
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
         '401':
           description: Missing or invalid API key
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'

   /v1/scrape/batch:
     post:
       operationId: scrapeBatch
       summary: Scrape multiple URLs
       description: |
         Scrape multiple URLs with controlled concurrency. Returns results individually
         so failed items don't block others.

         Request body fields:
           - items: Array of up to 50 URLs with per-item options
           - max_concurrency: Max concurrent requests (1-10)

         Each item can have its own mode, proxy, scroll config, etc.

       tags: [Scrape]
       security:
         - bearerAuth: []
       requestBody:
         required: true
         content:
           application/json:
             schema:
               $ref: '#/components/schemas/BatchScrapeRequest'
       responses:
         '200':
           description: Batch scraping complete
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/BatchScrapeResponse'
         '400':
           description: Bad Request
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
         '422':
           description: Validation error
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
         '401':
           description: Missing or invalid API key
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'

   # ======================================================= Cache Endpoints
   /v1/cache/stats:
     get:
       operationId: cacheStats
       summary: Cache statistics
       description: Returns current cache statistics (entries, size, expired count).
       tags: [Cache]
       security:
         - bearerAuth: []
       responses:
         '200':
           description: Cache stats returned
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/CacheStats'

   /v1/cache/{url}:
     delete:
       operationId: deleteCacheEntry
       summary: Delete single cache entry
       description: Remove a specific URL from the cache. Returns number of entries deleted.
       tags: [Cache]
       security:
         - bearerAuth: []
       parameters:
         - name: url
           in: path
           required: true
           schema:
             type: string
           description: URL to remove from cache
       responses:
         '200':
           description: Entry deleted successfully
           content:
             application/json:
               schema:
                 type: object
                 properties:
                   message:
                     type: string
         '400':
           description: Bad Request
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
         '404':
           description: URL not found in cache

   /v1/cache/purge:
     post:
       operationId: purgeCache
       summary: Purge cache entries
       description: |
         Remove all (or domain-scoped) entries from the cache.

         Body field:
           - domain: Optional domain to scope the purge (e.g., "example.com")

       tags: [Cache]
       security:
         - bearerAuth: []
       requestBody:
         required: false
         content:
           application/json:
             schema:
               type: object
               properties:
                 domain:
                   type: string
                   description: Optional domain scope (omit to purge all)
       responses:
         '200':
           description: Cache purged successfully
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/PurgeResponse'
         '400':
           description: Bad Request
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'

   /v1/cache/cleanup:
     post:
       operationId: cleanupCache
       summary: Run cache cleanup
       description: |
         Immediately run cache cleanup with optional overrides.

         Optional body fields (defaults to global config):
           - delete_expired_after_seconds: Delete entries older than this
           - max_entries: Max entries to keep
           - max_size_mb: Max total size in MB
           - vacuum: Run VACUUM to reclaim space

       tags: [Cache]
       security:
         - bearerAuth: []
       requestBody:
         required: false
         content:
           application/json:
             schema:
               $ref: '#/components/schemas/CacheCleanupRequest'
       responses:
         '200':
           description: Cleanup completed
           content:
             application/json:
               schema:
                 type: object
                 properties:
                   total_deleted:
                     type: integer
                   size_after_bytes:
                     type: integer
                   entries_after:
                     type: integer
         '400':
           description: Bad Request
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'

   /v1/cache/vacuum:
     post:
       operationId: vacuumCache
       summary: Vacuum cache disk space
       description: Run SQLite VACUUM to reclaim disk space. Prefer during maintenance windows.
       tags: [Cache]
       security:
         - bearerAuth: []
       responses:
         '200':
           description: Vacuum completed
           content:
             application/json:
               schema:
                 type: object
                 properties:
                   size_after_bytes:
                     type: integer
         '400':
           description: Bad Request
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'

   # ======================================================= Job Endpoints
   /v1/jobs:
     post:
       operationId: createJob
       summary: Create async scrape job
       description: |
         Queue a new async scrape job for background processing.

         The request body is identical to `/v1/scrape`. The job is queued immediately
         and processed by a background worker. Poll `/v1/jobs/{job_id}` for results.

         Requires API key authentication unless disabled in config.

       tags: [Jobs]
       security:
         - bearerAuth: []
       requestBody:
         required: true
         content:
           application/json:
             schema:
               $ref: '#/components/schemas/ScrapeRequest'
       responses:
         '201':
           description: Job created successfully
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/JobResponse'
         '400':
           description: Bad Request
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
         '422':
           description: Validation error
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
         '503':
           description: Async jobs are disabled

     get:
       operationId: listJobs
       summary: List all jobs
       description: Returns all async jobs (newest first) with their current status.
       tags: [Jobs]
       security:
         - bearerAuth: []
       responses:
         '200':
           description: List of jobs
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/JobListResponse'
         '400':
           description: Bad Request
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
         '401':
           description: Missing or invalid API key
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'

   /v1/jobs/{job_id}:
     get:
       operationId: getJob
       summary: Get job status
       description: |
         Return the current state and result of an async job.

         Required path parameter: `job_id`

         When authentication is enabled and expose_profile_in_response is true,
         includes the profile_name field.

       tags: [Jobs]
       security:
         - bearerAuth: []
       parameters:
         - name: job_id
           in: path
           required: true
           schema:
             type: string
           description: Job ID to retrieve
       responses:
         '200':
           description: Job details returned
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/JobResponse'
         '400':
           description: Bad Request
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
         '404':
           description: Job not found

     delete:
       operationId: deleteJob
       summary: Delete job
       description: Remove an async job from the store. Returns confirmation message.
       tags: [Jobs]
       security:
         - bearerAuth: []
       parameters:
         - name: job_id
           in: path
           required: true
           schema:
             type: string
           description: Job ID to delete
       responses:
         '200':
           description: Job deleted successfully
           content:
             application/json:
               schema:
                 type: object
                 properties:
                   message:
                     type: string
         '400':
           description: Bad Request
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'
         '404':
           description: Job not found

   /v1/jobs/{job_id}/cancel:
     post:
       operationId: cancelJob
       summary: Cancel queued job
       description: |
         Cancel a queued job. No-op if the job is already running or finished.

         Required path parameter: `job_id`

       tags: [Jobs]
       security:
         - bearerAuth: []
       parameters:
         - name: job_id
           in: path
           required: true
           schema:
             type: string
           description: Job ID to cancel
       responses:
         '200':
           description: Job cancelled or no-op (already running/finished)
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/JobResponse'
         '400':
           description: Bad Request
           content:
             application/json:
               schema:
                 $ref: '#/components/schemas/ErrorResponse'